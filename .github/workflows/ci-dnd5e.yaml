name: Build Module

on:
  push:
    branches:
      - main
    paths:
      - 'data/local/modules/dnd5e/**'
  pull_request:
    branches:
      - main
    paths:
      - 'data/local/modules/dnd5e/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      # Checkout the main Sheet Delver platform into the workspace root
      - name: Checkout Sheet Delver Repository
        uses: actions/checkout@v3
        with:
          repository: juvinious/sheet-delver
          ref: lifecycle-improvements
          path: ./

      # Checkout the dnd5e module into the expected data directory
      - name: Checkout DnD5e Module
        uses: actions/checkout@v3
        with:
          repository: sheetdelver/sd-dnd5e
          path: ./data/local/modules/dnd5e

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate config
        run: |
          cat > settings.yaml << EOF
          app:
              host: localhost
              port: 3000
              api-port: 3001
              protocol: http
              chat-history: 100
          foundry:
              host: localhost
              port: 30000
              protocol: http
              connector: socket
              username: gamemaster
              password: gamemaster
              foundryDataDirectory: foundryData
          debug:
              enabled: true
              level: 3
          EOF

      - name: Build module
        run: npm run build